name: Build openDAQ SDK documentation
on:
  workflow_dispatch:

env:
  site_path: ${{ github.workspace }}/build/site/
  site_zip: ${{ github.workspace }}/build/user_guide.zip
jobs:
  build_documentation:
    runs-on: ubuntu-22.04
    name: Build SDK Documentation
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install Antora
        run: npm i antora vinyl

      - name: Clone ASAM Antora extensions
        run: |
          git clone https://code.asam.net/common/asam-antora-extensions.git asam-antora-extensions

      - name: Patch ASAM extension to fix vinyl resolution
        run: |
          sed -i "s|require('vinyl')|require(require.resolve(\"vinyl\", { paths: [process.cwd()] }))|" asam-antora-extensions/core/file.js

      - name: Install Antora extensions, etc.
        run: |
          npm i @asciidoctor/tabs
          npm i @springio/antora-extensions



      - name: Patch ASAM extension to fix vinyl resolution
        run: |
          sed -i 's|require(\'vinyl\')|require(require.resolve("vinyl", { paths: [process.cwd()] }))|' asam-antora-extensions/core/file.js

      - name: Install vinyl and run Antora
        run: npx antora antora-playbook.yml

      - name: Compress Documentation
        working-directory: ${{ env.site_path }}
        run: zip -r ${{ env.site_zip }} .

      - uses: actions/upload-artifact@v4
        with:
          name: openDAQ_SDK_User_Guide
          path: ${{ env.site_zip }}
          retention-days: 7
